<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOUCH CAKE | עוגות בטאצ' אישי</title>

<!-- גופנים יוקרתיים -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{
--primary:#e10098;
--dark:#222;
--soft:#fff0f7;
--light:#fffefc;
--accent:#ffe6f0;
--gradient1:#ffd6f0;
--gradient2:#ffe6f0;
}

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{
font-family:'Playfair Display', serif;
background:linear-gradient(135deg, var(--gradient1), var(--gradient2));
color:var(--dark);
line-height:1.6;
padding-top:100px;
overflow-x:hidden;
position:relative;
}

/* HEADER */
header{
position:fixed; top:0; width:100%;
display:flex; align-items:center; justify-content:space-between;
padding:15px 8%;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.5);
z-index:1000;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
.logo img{height:65px;}
nav a{
margin-left:30px;
text-decoration:none;
color:var(--dark);
font-weight:600;
position:relative;
transition:.3s;
font-family:'Cinzel', serif;
}
nav a::after{
content:""; position:absolute; bottom:-5px; right:0; width:0; height:2px; background:var(--primary); transition:.4s;
}
nav a:hover::after{width:100%; left:0;}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)), url('images/hero.jpg') no-repeat center center/cover;
display:flex; flex-direction:column; justify-content:center; align-items:center;
text-align:center; position:relative; overflow:hidden;
z-index:0;
}
.hero h1{
font-family:'Cinzel', serif;
font-size:4rem; color:var(--primary);
margin-bottom:25px; text-shadow:0 4px 25px rgba(225,0,152,.35);
z-index:2; position:relative;
}
.cta{
background:var(--primary); color:#fff; padding:18px 50px; border-radius:60px;
text-decoration:none; font-weight:700; transition:.3s; box-shadow:0 10px 35px rgba(225,0,152,.3);
position:relative; z-index:2;
}
.cta:hover{transform:translateY(-3px); box-shadow:0 15px 50px rgba(225,0,152,.4);}

/* PARTICLES */
.particle{
position:absolute; 
border-radius:50%; 
background:rgba(255,215,0,0.8);
pointer-events:none; 
animation:moveParticles linear infinite;
box-shadow:0 0 10px rgba(255,215,0,0.7);
}
@keyframes moveParticles{
0%{transform:translateY(0) translateX(0) scale(0.5);}
50%{transform:translateY(-50vh) translateX(50px) scale(1);}
100%{transform:translateY(-100vh) translateX(100px) scale(0.3);}
}

/* SECTION */
.section{
padding:120px 8%;
text-align:center;
position:relative; z-index:1;
}
.section h2{
font-family:'Cinzel', serif;
font-size:2.8rem; color:var(--primary); margin-bottom:70px;
letter-spacing:1px; text-shadow:0 2px 12px rgba(225,0,152,.15);
}

/* GALLERY CENTERED */
.gallery{
display:flex; flex-wrap:wrap; gap:30px; justify-content:center;
}
.card{
flex:1 1 300px; max-width:360px; position:relative; overflow:hidden; border-radius:25px; height:380px;
cursor:pointer; background:linear-gradient(145deg, var(--accent), #fff);
box-shadow:0 20px 45px rgba(0,0,0,0.08), 0 0 25px rgba(225,0,152,0.05);
transition:.6s;
}
.card img{
width:100%; height:100%; object-fit:cover; transition:.7s; border-radius:25px;
}
.card:hover img{transform:scale(1.1); filter:brightness(1.05);}
.overlay{
position:absolute; bottom:0; width:100%; background:rgba(255,255,255,0.3);
backdrop-filter:blur(8px); color:var(--primary); padding:25px; opacity:0;
transition:.4s; text-align:center; font-weight:600; font-size:1.1rem;
}
.card:hover .overlay{opacity:1;}

/* FORM */
form{max-width:650px; margin:auto; display:flex; flex-direction:column; gap:22px;}
input,textarea{padding:18px; border:1px solid #ddd; border-radius:15px; font-family:inherit; font-size:1rem; transition:.3s;}
input:focus, textarea:focus{border-color:var(--primary); box-shadow:0 5px 25px rgba(225,0,152,.2); outline:none;}
button{background:var(--primary); color:#fff; padding:18px; border:none; border-radius:60px; font-size:1.1rem; cursor:pointer; transition:.4s; box-shadow:0 12px 30px rgba(225,0,152,.3);}
button:hover{transform:translateY(-3px); box-shadow:0 18px 40px rgba(225,0,152,.4);}

footer{background:var(--soft); padding:80px 10%; text-align:center; font-weight:500; letter-spacing:1px; color:var(--dark); font-family:'Playfair Display', serif;}

.lightbox{position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); display:none; justify-content:center; align-items:center; z-index:5000;}
.lightbox img{max-width:90%; max-height:80%; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.5);}

@media(max-width:768px){
.hero h1{font-size:2.4rem;}
.section{padding:80px 5%;}
.card{height:300px;}
}
</style>
</head>

<body>

<header>
<div class="logo"><a href="#"><img src="images/logo.png" alt="Logo"></a></div>
<nav><a href="#gallery">גלריה</a><a href="#order">הזמנה</a></nav>
</header>

<section class="hero">
<h1 data-aos="fade-up">עוגות ויטרינה בטאצ'</h1>
<a href="#order" class="cta" data-aos="fade-up" data-aos-delay="200">הזמינו עכשיו</a>
</section>

<section class="section" id="gallery">
<h2 data-aos="fade-up">הגלריה שלנו</h2>
<div class="gallery">
<div class="card" data-aos="zoom-in"><img src="images/cake1.jpg"><div class="overlay">עוגת יוקרה</div></div>
<div class="card" data-aos="zoom-in" data-aos-delay="150"><img src="images/cake2.jpg"><div class="overlay">עיצוב אישי</div></div>
<div class="card" data-aos="zoom-in" data-aos-delay="300"><img src="images/cake3.jpg"><div class="overlay">בצק סוכר מקצועי</div></div>
<div class="card special" data-aos="zoom-in"><img src="images/cake4.jpg"><div class="overlay">קונספט מיוחד</div></div>
</div>
</section>

<section class="section" id="order">
<h2 data-aos="fade-up">טופס הזמנה</h2>
<form>
<input type="text" placeholder="שם מלא" required>
<input type="tel" placeholder="טלפון (05XXXXXXXX)" required pattern="^05\d{8}$">
<input type="date" id="eventDate" required>
<textarea placeholder="ספר/י לנו איזה עוגה תרצו" rows="4" required></textarea>
<button type="submit">שלח/י הזמנה</button>
</form>
</section>

<footer>
<p>© 2026 TOUCH CAKE</p>
</footer>

<div class="lightbox" id="lightbox"><img src=""></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({duration:1200, once:true});
const dateInput=document.getElementById("eventDate");
dateInput.min=new Date().toISOString().split("T")[0];

// Lightbox
const cards=document.querySelectorAll(".card img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=lightbox.querySelector("img");
cards.forEach(img=>{img.addEventListener("click",()=>{lightbox.style.display="flex"; lightboxImg.src=img.src;});});
lightbox.addEventListener("click",()=>{lightbox.style.display="none";});

// PARTICLES GENERATION - נצנצים מוזהבים
for(let i=0;i<70;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.top=Math.random()*100+"%";
  const size=Math.random()*6+3;
  p.style.width=size+"px";
  p.style.height=size+"px";
  p.style.animationDuration=(8+Math.random()*12)+"s";
  p.style.background=`rgba(255,215,0,${0.3+Math.random()*0.5})`;
  document.body.appendChild(p);
}
</script>

</body>
</html>
